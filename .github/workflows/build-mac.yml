name: Build Mac App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name summarize_csv summarize_csv.py
          pyinstaller --onefile --name generate_voting_html generate_voting_html.py

      - name: Package
        run: |
          mkdir -p vote_tools/summarize_csv
          cp dist/summarize_csv vote_tools/summarize_csv/
          mkdir vote_tools/summarize_csv/csv
          echo "CSVファイルをこのcsvフォルダに入れてから summarize_csv を実行してください。" > vote_tools/summarize_csv/README.txt

          mkdir -p vote_tools/generate_voting_html
          cp dist/generate_voting_html vote_tools/generate_voting_html/
          echo "jinjaファイルとExcelファイルをこのフォルダに入れてから generate_voting_html を実行してください。" > vote_tools/generate_voting_html/README.txt

          zip -r VoteTools_Mac.zip vote_tools

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoteTools_Mac
          path: VoteTools_Mac.zip
